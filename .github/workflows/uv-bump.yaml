name: UV version bump 

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version part to bump'
        required: true
        default: 'major'
        type: choice
        options:
          - major
          - minor
          - patch

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
            token: ${{ steps.app-token.outputs.token }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Bump project version
        id: uv-bump
        run: | 
          uv version --bump ${{ github.event.inputs.bump }}
          echo "new_version=$(uv version --short)" >> $GITHUB_OUTPUT

      - name: Commit Change, Create PR and Merge
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ steps.uv-bump.outputs.new_version }}
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"

          BRANCH_NAME="automation/bump-$VERSION"
          git checkout -b "$BRANCH_NAME"

          git add pyproject.toml uv.lock
          git commit -m "Bump version to $VERSION"
          git push origin "$BRANCH_NAME"

          PR_URL=$(gh pr create \
            --title "Bump version to $VERSION" \
            --body "- This PR was automatically generated by the uv version bump workflow." \
            --head "$BRANCH_NAME" \
            --base main)

          gh pr merge "$PR_URL" --squash

      - name: Tag and Push
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ steps.uv-bump.outputs.new_version }}
        run: |
          git fetch origin main
          git checkout main
          git pull origin main
          
          git tag "v$VERSION"
          git push origin "v$VERSION"

          gh release create "v$VERSION" \
          --title "Release v$VERSION" \
          --generate-notes
